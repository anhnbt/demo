    const board = 10;
    // Khoi tao mang 2 chieu
    const caroBoard = new Array(board);
    for (let i = 0; i < board; i++) {
        caroBoard[i] = new Array(board);
    }
    // gan gia tri cho mang
    for (let i = 0; i < board; i++) {
        for (let j = 0; j < caroBoard[i].length; j++) {
            caroBoard[i][j] = 0;
        }
    }
    let firstPlayer = 'X';
    let secondPlayer = 'O';
    let turn = firstPlayer;
    drawBoard();
    function drawBoard() {
        let table = '<table>';
        for (let i = 0; i < caroBoard.length; i++) {
            table += '<tr>';
            for (let j = 0; j < caroBoard[i].length; j++) {
                const color = caroBoard[i][j] === 'X' ? 'red' : caroBoard[i][j] !== 0 ? 'blue' : 'black';
                if (caroBoard[i][j] !== 0) {
                    table += `<td><button style="color: ${color}" onclick="check(${i}, ${j})" disabled="disabled">${caroBoard[i][j]}</button></td>`;
                } else {
                    table += `<td><button style="color: ${color}" onclick="check(${i}, ${j})">${caroBoard[i][j]}</button></td>`;
                }
                // table += "<td><button onclick='check(" + i + ", " + j + ")'>" + caroBoard[i][j] + "</button></td>"
            }
            table += '</tr>';
        }
        table += '</table>';
        document.getElementById('board').innerHTML = table;
    }

    function check(row, column) {
        caroBoard[row][column] = turn;
        if (turn === firstPlayer) {
            turn = secondPlayer;
        } else {
            turn = firstPlayer;
        }
        document.getElementById("turn").innerText = `Turn: ${turn}`;
        drawBoard();
    }
