<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<form>
    <input type="text" name="" id="first" placeholder="Nhập a">
    <input type="text" name="" id="second" placeholder="Nhập b">
    <div>
        <button type="button" onclick="calculator('+')">Addition (+)</button>
        <button type="button" onclick="calculator('-')">Subtraction (-)</button>
        <button type="button" onclick="calculator('*')">Multiplication (x)</button>
        <button type="button" onclick="calculator('/')">Division (/)</button>
    </div>
</form>
<div id="result"></div>
<script src="calculator.js"></script>
</body>
</html>
